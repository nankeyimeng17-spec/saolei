<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中国象棋 · 在线对战</title>
  <style>
    /* ==================== CSS 变量 ==================== */
    :root {
      --bg-primary: #1a0f0a;
      --bg-panel: #2c1810;
      --bg-board: #e8d5a3;
      --board-line: #4a3520;
      --piece-red-bg: #b5343a;
      --piece-red-text: #f5e6c8;
      --piece-black-bg: #2c3e50;
      --piece-black-text: #f5e6c8;
      --accent-gold: #c9a44b;
      --accent-red: #c0392b;
      --text-primary: #f0e6d3;
      --text-secondary: #c4a97d;
      --highlight-gold: rgba(201, 164, 75, 0.7);
      --valid-dot: rgba(80, 180, 100, 0.55);
      --danger: #e74c3c;
      --cell-size: 54px;
      --board-pad: 32px;
      --mode-card-hover: rgba(201, 164, 75, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'KaiTi', 'STKaiti', 'AR PL UKai CN', 'Noto Serif SC', serif;
      background: radial-gradient(ellipse at center, #3d1f10 0%, #1a0f0a 70%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      padding: 12px;
    }

    #app {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .title { font-size: 28px; font-weight: bold; color: var(--accent-gold); letter-spacing: 4px; }
    .title .lantern { font-size: 24px; }

    .panel {
      background: var(--bg-panel);
      border: 1px solid rgba(201, 164, 75, 0.3);
      border-radius: 10px;
      padding: 16px 20px;
      width: 100%;
      text-align: center;
    }

    .btn {
      font-family: inherit;
      font-size: 16px;
      padding: 10px 24px;
      border: 1px solid var(--accent-gold);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-primary { background: var(--accent-red); color: var(--text-primary); border-color: var(--accent-red); }
    .btn-primary:hover { background: #d4453b; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--accent-gold); }
    .btn-outline:hover { background: var(--mode-card-hover); }
    .btn-small { font-size: 13px; padding: 6px 14px; }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn.selected { background: rgba(201,164,75,0.25); border-color: var(--accent-gold); }

    /* ==================== 首页 ==================== */
    #view-home { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .mode-card {
      background: var(--bg-panel);
      border: 2px solid rgba(201, 164, 75, 0.25);
      border-radius: 14px;
      padding: 28px 24px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
    }
    .mode-card:hover {
      border-color: var(--accent-gold);
      background: var(--mode-card-hover);
      transform: translateY(-2px);
    }
    .mode-card .icon { font-size: 40px; display: block; margin-bottom: 8px; }
    .mode-card .label { font-size: 20px; font-weight: bold; color: var(--accent-gold); letter-spacing: 2px; }
    .mode-card .desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* ==================== 大厅 ==================== */
    #lobby-room-list { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
    .room-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      gap: 10px;
    }
    .room-card .room-name { font-weight: bold; color: var(--accent-gold); flex: 1; text-align: left; font-size: 15px; }
    .room-card .room-time { font-size: 12px; color: var(--text-secondary); }
    .room-empty { color: var(--text-secondary); padding: 20px; font-size: 14px; }
    .lobby-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

    /* ==================== AI设置 ==================== */
    .setting-group { margin: 10px 0; }
    .setting-group .label { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 1px; }
    .setting-options { display: flex; gap: 8px; justify-content: center; }

    /* ==================== 棋盘容器 ==================== */
    #board-container {
      position: relative; display: block; margin: 0 auto;
      touch-action: manipulation;
    }
    #board-canvas {
      display: block; border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      touch-action: manipulation;
    }
    #pieces-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; touch-action: manipulation;
    }

    /* ==================== 棋子 ==================== */
    .piece {
      position: absolute; transform: translate(-50%, -50%);
      width: calc(var(--cell-size) * 0.84);
      height: calc(var(--cell-size) * 0.84);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: calc(var(--cell-size) * 0.46);
      font-weight: bold; cursor: pointer;
      pointer-events: auto; touch-action: manipulation;
      -webkit-touch-callout: none;
      box-shadow: 2px 3px 8px rgba(0,0,0,0.35); z-index: 2;
    }
    .piece-red {
      background: radial-gradient(circle at 35% 35%, #d4685a, var(--piece-red-bg) 60%, #7a1f1a 100%);
      color: var(--piece-red-text); border: 2px solid #8b1a1a;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
    }
    .piece-black {
      background: radial-gradient(circle at 35% 35%, #4a6075, var(--piece-black-bg) 60%, #151d26 100%);
      color: var(--piece-black-text); border: 2px solid #1a2530;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
    }
    .piece.selected { box-shadow: 0 0 14px 3px var(--highlight-gold), 2px 3px 8px rgba(0,0,0,0.35); z-index: 5; }

    .valid-dot {
      position: absolute; transform: translate(-50%, -50%);
      width: calc(var(--cell-size) * 0.24); height: calc(var(--cell-size) * 0.24);
      border-radius: 50%; background: var(--valid-dot);
      pointer-events: none; z-index: 3;
    }
    .valid-capture {
      position: absolute; transform: translate(-50%, -50%);
      width: calc(var(--cell-size) * 0.88); height: calc(var(--cell-size) * 0.88);
      border-radius: 50%; border: 3px solid rgba(220, 60, 50, 0.55);
      pointer-events: none; z-index: 1;
    }

    /* ==================== 游戏状态 ==================== */
    .player-label { font-size: 14px; color: var(--text-secondary); text-align: center; letter-spacing: 2px; }
    .player-label.you { color: var(--accent-gold); font-weight: bold; }

    #game-mode-tag {
      font-size: 12px; color: var(--accent-gold);
      background: rgba(201,164,75,0.15); padding: 2px 10px; border-radius: 10px;
    }

    #game-status {
      font-size: 16px; font-weight: bold; text-align: center;
      min-height: 24px; color: var(--text-primary); letter-spacing: 1px;
    }
    #game-status.check { color: var(--danger); animation: pulse 0.8s infinite; }
    #game-status.thinking { color: var(--accent-gold); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ==================== 状态栏 ==================== */
    #status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; font-size: 13px; color: var(--text-secondary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.connected { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
    .status-dot.waiting { background: #f39c12; animation: pulse 1.5s infinite; }
    .status-dot.disconnected { background: #e74c3c; }

    #actions { display: flex; gap: 10px; justify-content: center; }

    /* ==================== 弹窗 ==================== */
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); display: none;
      justify-content: center; align-items: center; z-index: 100;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #overlay.show { display: flex; }
    #overlay-content {
      background: var(--bg-panel); border: 1px solid var(--accent-gold);
      border-radius: 14px; padding: 32px 28px; text-align: center;
      max-width: 340px; width: 90%;
    }
    #overlay-message { font-size: 22px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; }
    #overlay-message.win { color: var(--accent-gold); }
    #overlay-message.lose { color: var(--text-secondary); }

    /* ==================== Toast ==================== */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--bg-panel); border: 1px solid var(--accent-gold);
      border-radius: 8px; padding: 10px 20px; font-size: 14px;
      z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
      pointer-events: none;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* ==================== 响应式 ==================== */
    @media (max-width: 480px) {
      :root { --cell-size: min(48px, calc((100vw - 64px) / 9)); --board-pad: 24px; }
      .title { font-size: 22px; }
      .btn { font-size: 14px; padding: 8px 18px; }
      #game-status { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title"><span class="lantern">🏮</span> 中国象棋</div>

    <!-- ===== 首页 ===== -->
    <div id="view-home" class="view">
      <div class="mode-card" id="card-online">
        <span class="icon">🌐</span>
        <span class="label">在线对战</span>
        <span class="desc">浏览公开房间，加入或创建对局</span>
      </div>
      <div class="mode-card" id="card-ai">
        <span class="icon">🤖</span>
        <span class="label">人机对弈</span>
        <span class="desc">与 AI 切磋，可选择难度</span>
      </div>
    </div>

    <!-- ===== 大厅 ===== -->
    <div id="view-lobby" class="view" style="display:none;">
      <div class="panel" style="text-align:left;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="color:var(--accent-gold);font-weight:bold;">🏠 可加入的房间</span>
          <button class="btn btn-outline btn-small" id="btn-lobby-refresh">🔄 刷新</button>
        </div>
        <div id="lobby-room-list"><div class="room-empty">加载中...</div></div>
        <div class="lobby-actions" style="margin-top:12px;">
          <button class="btn btn-primary" id="btn-lobby-create">🏠 创建房间</button>
        </div>
        <div style="margin-top:10px;display:flex;gap:6px;justify-content:center;">
          <input type="text" id="lobby-room-input" placeholder="或输入房间号" maxlength="20" autocomplete="off" style="font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid rgba(201,164,75,0.4);border-radius:6px;background:rgba(0,0,0,0.2);color:var(--text-primary);width:140px;outline:none;">
          <button class="btn btn-outline btn-small" id="btn-lobby-join">加入</button>
        </div>
        <div id="lobby-manual-hint" style="display:none;font-size:12px;color:var(--text-secondary);margin-top:6px;">大厅服务暂不可用，请使用手动输入房间号加入</div>
      </div>
      <button class="btn btn-outline btn-small" id="btn-lobby-back">← 返回首页</button>
    </div>

    <!-- ===== AI设置 ===== -->
    <div id="view-ai-setup" class="view" style="display:none;">
      <div class="panel">
        <div class="setting-group">
          <div class="label">选择难度</div>
          <div class="setting-options">
            <button class="btn btn-outline btn-small diff-btn" data-diff="easy">🌱 简单</button>
            <button class="btn btn-outline btn-small diff-btn selected" data-diff="medium">🍂 中等</button>
            <button class="btn btn-outline btn-small diff-btn" data-diff="hard">🔥 困难</button>
          </div>
        </div>
        <div class="setting-group">
          <div class="label">执子颜色</div>
          <div class="setting-options">
            <button class="btn btn-outline btn-small color-btn selected" data-color="red">🔴 红方（先手）</button>
            <button class="btn btn-outline btn-small color-btn" data-color="black">⚫ 黑方</button>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-ai-start" style="margin-top:10px;">⚔️ 开始对局</button>
      </div>
      <button class="btn btn-outline btn-small" id="btn-ai-back">← 返回首页</button>
    </div>

    <!-- ===== 游戏 ===== -->
    <div id="view-game" class="view" style="display:none;">
      <div class="panel" id="status-bar">
        <span class="status-dot waiting" id="status-dot"></span>
        <span id="status-text">等待中...</span>
        <span id="game-mode-tag"></span>
        <button class="btn btn-outline btn-small" id="btn-copy-link">📋 复制链接</button>
        <button class="btn btn-outline btn-small" id="btn-game-back">← 返回</button>
      </div>
      <div class="player-label" id="opponent-label">对手</div>
      <div id="board-container">
        <canvas id="board-canvas"></canvas>
        <div id="pieces-layer"></div>
      </div>
      <div class="player-label you" id="player-label">你</div>
      <div id="game-status"></div>
      <div id="actions">
        <button class="btn btn-outline btn-small" id="btn-resign">🏳️ 认输</button>
        <button class="btn btn-outline btn-small" id="btn-draw">🤝 求和</button>
      </div>
    </div>

    <!-- 弹窗 -->
    <div id="overlay">
      <div id="overlay-content">
        <div id="overlay-message"></div>
        <button class="btn btn-primary" id="btn-overlay-action">再来一局</button>
      </div>
    </div>
  </div>

  <!-- 依赖 -->
  <script src="chess-engine.js"></script>
  <script src="chess-ai.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="chess-lobby.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <script>
  (function () {
    'use strict';

    var RED = ChessEngine.COLORS.RED;
    var BLACK = ChessEngine.COLORS.BLACK;

    // ==================== DOM 引用 ====================
    // 视图
    var viewHome = document.getElementById('view-home');
    var viewLobby = document.getElementById('view-lobby');
    var viewAISetup = document.getElementById('view-ai-setup');
    var viewGame = document.getElementById('view-game');

    // 首页
    var cardOnline = document.getElementById('card-online');
    var cardAI = document.getElementById('card-ai');

    // 大厅
    var lobbyRoomList = document.getElementById('lobby-room-list');
    var btnLobbyCreate = document.getElementById('btn-lobby-create');
    var btnLobbyJoin = document.getElementById('btn-lobby-join');
    var lobbyRoomInput = document.getElementById('lobby-room-input');
    var btnLobbyRefresh = document.getElementById('btn-lobby-refresh');
    var btnLobbyBack = document.getElementById('btn-lobby-back');
    var lobbyManualHint = document.getElementById('lobby-manual-hint');

    // AI设置
    var btnAIStart = document.getElementById('btn-ai-start');
    var btnAIBack = document.getElementById('btn-ai-back');
    var aiDifficulty = 'medium';
    var aiPlayerColor = 'red';

    // 游戏
    var statusDot = document.getElementById('status-dot');
    var statusText = document.getElementById('status-text');
    var gameModeTag = document.getElementById('game-mode-tag');
    var btnCopyLink = document.getElementById('btn-copy-link');
    var btnGameBack = document.getElementById('btn-game-back');
    var opponentLabel = document.getElementById('opponent-label');
    var playerLabel = document.getElementById('player-label');
    var gameStatus = document.getElementById('game-status');
    var boardCanvas = document.getElementById('board-canvas');
    var piecesLayer = document.getElementById('pieces-layer');
    var btnResign = document.getElementById('btn-resign');
    var btnDraw = document.getElementById('btn-draw');
    var overlay = document.getElementById('overlay');
    var overlayMessage = document.getElementById('overlay-message');
    var btnOverlayAction = document.getElementById('btn-overlay-action');

    // ==================== 状态 ====================
    var state = ChessEngine.createInitialState();
    var myColor = null;
    var selectedPiece = null;
    var validMoves = [];
    var isMyTurn = false;
    var peer = null;
    var conn = null;
    var roomId = null;
    var boardWidth, boardHeight, padding, cellSize;
    var isGameStarted = false;
    var joinTimeoutId = null;
    var gameMode = null;         // 'online' | 'ai'
    var lobbyRoomId = null;      // 当前在大厅中创建的房间 ID
    var aIThinking = false;

    // ==================== 视图切换 ====================
    function showView(name) {
      [viewHome, viewLobby, viewAISetup, viewGame].forEach(function (v) {
        v.style.display = 'none';
      });
      switch (name) {
        case 'home': viewHome.style.display = ''; break;
        case 'lobby': viewLobby.style.display = ''; break;
        case 'ai-setup': viewAISetup.style.display = ''; break;
        case 'game': viewGame.style.display = ''; break;
      }
    }

    // ==================== Toast ====================
    function showToast(msg) {
      var t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 2500);
    }

    // ==================== 棋盘渲染（复用现有逻辑） ====================

    function calcDimensions() {
      var containerWidth = boardCanvas.parentElement.clientWidth;
      var maxBoardWidth = Math.min(containerWidth - 4, 520);
      var rawCell = Math.floor((maxBoardWidth - 60) / 8);
      cellSize = Math.max(36, Math.min(54, rawCell));
      padding = cellSize * 0.6;
      boardWidth = padding * 2 + 8 * cellSize;
      boardHeight = padding * 2 + 9 * cellSize;
    }

    function drawBoard() {
      calcDimensions();
      var dpr = window.devicePixelRatio || 1;
      boardCanvas.width = boardWidth * dpr;
      boardCanvas.height = boardHeight * dpr;
      boardCanvas.style.width = boardWidth + 'px';
      boardCanvas.style.height = boardHeight + 'px';
      var container = boardCanvas.parentElement;
      container.style.width = boardWidth + 'px';
      container.style.height = boardHeight + 'px';
      document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
      document.documentElement.style.setProperty('--board-pad', padding + 'px');

      var ctx = boardCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      var bgGrad = ctx.createLinearGradient(0, 0, boardWidth, boardHeight);
      bgGrad.addColorStop(0, '#f2deac'); bgGrad.addColorStop(0.3, '#e8d5a3');
      bgGrad.addColorStop(0.6, '#e0ca95'); bgGrad.addColorStop(1, '#ecd9a6');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, boardWidth, boardHeight);

      ctx.strokeStyle = '#4a3520'; ctx.lineWidth = 2.5;
      ctx.strokeRect(padding - 6, padding - 6, 8 * cellSize + 12, 9 * cellSize + 12);

      ctx.strokeStyle = '#3d2a15'; ctx.lineWidth = 1;
      for (var r = 0; r <= 4; r++) {
        var y = padding + r * cellSize;
        ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + 8 * cellSize, y); ctx.stroke();
      }
      for (r = 5; r <= 9; r++) {
        y = padding + r * cellSize;
        ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + 8 * cellSize, y); ctx.stroke();
      }
      for (var c = 0; c <= 8; c++) {
        var x = padding + c * cellSize;
        if (c === 0 || c === 8) {
          ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, padding + 9 * cellSize); ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, padding + 4 * cellSize); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x, padding + 5 * cellSize); ctx.lineTo(x, padding + 9 * cellSize); ctx.stroke();
        }
      }
      ctx.strokeStyle = '#3d2a15'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(padding + 3 * cellSize, padding); ctx.lineTo(padding + 5 * cellSize, padding + 2 * cellSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(padding + 5 * cellSize, padding); ctx.lineTo(padding + 3 * cellSize, padding + 2 * cellSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(padding + 3 * cellSize, padding + 7 * cellSize); ctx.lineTo(padding + 5 * cellSize, padding + 9 * cellSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(padding + 5 * cellSize, padding + 7 * cellSize); ctx.lineTo(padding + 3 * cellSize, padding + 9 * cellSize); ctx.stroke();

      ctx.fillStyle = '#3d2a15';
      ctx.font = 'bold ' + (cellSize * 0.35) + 'px "KaiTi","STKaiti",serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var riverY = padding + 4.5 * cellSize;
      ctx.fillText('楚  河', padding + 2 * cellSize, riverY);
      ctx.fillText('汉  界', padding + 6 * cellSize, riverY);
    }

    function getPiecePos(row, col) {
      return { x: padding + col * cellSize, y: padding + row * cellSize };
    }

    function renderPieces() {
      piecesLayer.innerHTML = '';
      for (var r = 0; r < 10; r++) {
        for (var cc = 0; cc < 9; cc++) {
          var piece = state.board[r][cc];
          if (!piece) continue;
          var div = document.createElement('div');
          div.className = 'piece piece-' + piece.color;
          div.textContent = ChessEngine.getPieceChar(piece);
          var pos = getPiecePos(r, cc);
          div.style.left = pos.x + 'px';
          div.style.top = pos.y + 'px';
          div.dataset.row = r;
          div.dataset.col = cc;
          if (selectedPiece && selectedPiece.row === r && selectedPiece.col === cc) {
            div.classList.add('selected');
          }
          if (isMyTurn && piece.color === myColor && !state.gameOver && !aIThinking) {
            div.style.pointerEvents = 'auto'; div.style.cursor = 'pointer';
            div.addEventListener('click', function (evt) {
              evt.stopPropagation();
              onPieceClick(parseInt(this.dataset.row), parseInt(this.dataset.col));
            });
            div.addEventListener('touchend', function (evt) {
              evt.preventDefault(); evt.stopPropagation();
              onPieceClick(parseInt(this.dataset.row), parseInt(this.dataset.col));
            });
          } else {
            div.style.pointerEvents = 'none';
          }
          piecesLayer.appendChild(div);
        }
      }
      renderValidMoveIndicators();
    }

    function renderValidMoveIndicators() {
      var old = piecesLayer.querySelectorAll('.valid-dot,.valid-capture');
      for (var i = 0; i < old.length; i++) { old[i].remove(); }
      for (var j = 0; j < validMoves.length; j++) {
        var move = validMoves[j];
        var pos = getPiecePos(move.row, move.col);
        if (move.isCapture) {
          var ring = document.createElement('div');
          ring.className = 'valid-capture';
          ring.style.left = pos.x + 'px'; ring.style.top = pos.y + 'px';
          piecesLayer.appendChild(ring);
        } else {
          var dot = document.createElement('div');
          dot.className = 'valid-dot';
          dot.style.left = pos.x + 'px'; dot.style.top = pos.y + 'px';
          piecesLayer.appendChild(dot);
        }
      }
    }

    function refreshBoard() {
      renderPieces();
      updateGameStatus();
    }

    // ==================== 交互处理 ====================

    function onPieceClick(row, col) {
      if (!isMyTurn || state.gameOver || !isGameStarted || aIThinking) return;
      var piece = state.board[row][col];
      if (selectedPiece) {
        if (piece && piece.color === myColor) { selectPiece(row, col); return; }
        for (var i = 0; i < validMoves.length; i++) {
          if (validMoves[i].row === row && validMoves[i].col === col) {
            executeMove(selectedPiece.row, selectedPiece.col, row, col);
            return;
          }
        }
        deselectPiece();
      } else {
        if (piece && piece.color === myColor) selectPiece(row, col);
      }
    }

    function selectPiece(row, col) {
      selectedPiece = { row: row, col: col };
      var moves = ChessEngine.getValidMoves(state.board, row, col);
      validMoves = moves.map(function (m) {
        return { row: m.row, col: m.col, isCapture: state.board[m.row][m.col] !== null };
      });
      refreshBoard();
    }

    function deselectPiece() {
      selectedPiece = null; validMoves = []; refreshBoard();
    }

    function executeMove(fromRow, fromCol, toRow, toCol) {
      state = ChessEngine.makeMove(state, fromRow, fromCol, toRow, toCol);
      selectedPiece = null; validMoves = [];
      isMyTurn = false;
      refreshBoard();

      if (gameMode === 'online') {
        sendMessage({ type: 'move', from: { row: fromRow, col: fromCol }, to: { row: toRow, col: toCol } });
      }

      if (state.gameOver) { showGameOver(); return; }

      // AI 模式：机器人走棋
      if (gameMode === 'ai' && !state.gameOver) {
        scheduleAIMove();
      }
    }

    boardCanvas.addEventListener('click', function (e) {
      if (!isMyTurn || state.gameOver || !isGameStarted || aIThinking) return;
      var pos = getIntersectionFromEvent(e);
      if (!pos) { deselectPiece(); return; }
      var piece = state.board[pos.row][pos.col];
      if (selectedPiece) {
        if (piece && piece.color === myColor) return;
        for (var i = 0; i < validMoves.length; i++) {
          if (validMoves[i].row === pos.row && validMoves[i].col === pos.col) {
            executeMove(selectedPiece.row, selectedPiece.col, pos.row, pos.col);
            return;
          }
        }
        deselectPiece();
      }
    });

    function getIntersectionFromEvent(e) {
      var rect = boardCanvas.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      var col = Math.round((x - padding) / cellSize);
      var row = Math.round((y - padding) / cellSize);
      if (col < 0 || col > 8 || row < 0 || row > 9) return null;
      var cx = padding + col * cellSize, cy = padding + row * cellSize;
      if (Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy)) > cellSize * 0.5) return null;
      return { row: row, col: col };
    }

    boardCanvas.addEventListener('touchend', function (e) {
      if (!isMyTurn || state.gameOver || !isGameStarted || aIThinking) return;
      if (e.target !== boardCanvas) return;
      var pos = getIntersectionFromEvent(e);
      if (!pos) { deselectPiece(); return; }
      var piece = state.board[pos.row][pos.col];
      if (selectedPiece) {
        if (piece && piece.color === myColor) return;
        for (var i = 0; i < validMoves.length; i++) {
          if (validMoves[i].row === pos.row && validMoves[i].col === pos.col) {
            executeMove(selectedPiece.row, selectedPiece.col, pos.row, pos.col);
            return;
          }
        }
        deselectPiece();
      }
    });

    // ==================== 游戏状态显示 ====================

    function updateGameStatus() {
      if (!isGameStarted) return;
      if (state.gameOver) {
        var isWin = state.gameOver.winner === myColor;
        gameStatus.textContent = isWin ? '🎉 你赢了！' : (state.gameOver.reason === 'draw' ? '🤝 和棋' : '😞 你输了');
        gameStatus.className = '';
        return;
      }
      if (aIThinking) {
        gameStatus.textContent = '🤖 AI 思考中...';
        gameStatus.className = 'thinking';
        return;
      }
      if (state.inCheck) {
        gameStatus.textContent = state.inCheck === myColor ? '⚠️ 将军！你被将军了！' : '⚔️ 将军！';
        gameStatus.className = 'check';
        return;
      }
      if (isMyTurn) {
        gameStatus.textContent = '轮到你了，请走棋';
        gameStatus.className = '';
      } else {
        gameStatus.textContent = gameMode === 'ai' ? 'AI 思考中...' : '等待对手走棋...';
        gameStatus.className = gameMode === 'ai' ? 'thinking' : '';
      }

      if (myColor === RED) {
        playerLabel.textContent = '你（红方' + (gameMode === 'online' ? '' : '') + '）';
        opponentLabel.textContent = gameMode === 'ai' ? 'AI（黑方）' : '对手（黑方）';
      } else {
        playerLabel.textContent = '你（黑方）';
        opponentLabel.textContent = gameMode === 'ai' ? 'AI（红方）' : '对手（红方）';
      }
    }

    function showGameOver() {
      if (!state.gameOver) return;
      var isWin = state.gameOver.winner === myColor;
      var reason = state.gameOver.reason;
      var reasonText = reason === 'checkmate' ? '将死' : reason === 'stalemate' ? '困毙' : reason === 'resign' ? '认输' : '和棋';

      if (reason === 'draw') {
        overlayMessage.textContent = '🤝 和棋';
        overlayMessage.className = '';
      } else {
        overlayMessage.textContent = (isWin ? '🎉 你赢了！' : '😞 你输了') + ' (' + reasonText + ')';
        overlayMessage.className = isWin ? 'win' : 'lose';
      }
      btnOverlayAction.textContent = '再来一局';
      overlay.classList.add('show');
      btnResign.disabled = true;
      btnDraw.disabled = true;
    }

    // ==================== AI 模式 ====================

    function scheduleAIMove() {
      aIThinking = true;
      updateGameStatus();
      refreshBoard();

      setTimeout(function () {
        var move = ChessAI.findBestMove(state, aiDifficulty);
        if (move) {
          state = ChessEngine.makeMove(state, move.fromRow, move.fromCol, move.toRow, move.toCol);
        }
        aIThinking = false;
        isMyTurn = true;
        selectedPiece = null;
        validMoves = [];
        refreshBoard();
        if (state.gameOver) showGameOver();
      }, 250);
    }

    function startAIGame() {
      gameMode = 'ai';
      state = ChessEngine.createInitialState();
      selectedPiece = null;
      validMoves = [];
      isGameStarted = true;
      btnDraw.style.display = 'none';

      if (aiPlayerColor === 'red') {
        myColor = RED;
        isMyTurn = true;
        gameModeTag.textContent = '人机对弈 · ' + aiDifficultyLabel();
        opponentLabel.textContent = 'AI（黑方）';
        playerLabel.textContent = '你（红方 · 先手）';
      } else {
        myColor = BLACK;
        isMyTurn = false;
        gameModeTag.textContent = '人机对弈 · ' + aiDifficultyLabel();
        opponentLabel.textContent = 'AI（红方 · 先手）';
        playerLabel.textContent = '你（黑方）';
      }

      showView('game');
      setConnectionStatus('connected', '人机对弈');
      statusDot.style.display = 'none';
      btnCopyLink.style.display = 'none';
      updatePlayerLabels();
      requestAnimationFrame(function () { drawBoard(); refreshBoard(); });

      // AI 先手
      if (!isMyTurn) scheduleAIMove();
    }

    function aiDifficultyLabel() {
      return aiDifficulty === 'easy' ? '简单' : aiDifficulty === 'medium' ? '中等' : '困难';
    }

    // ==================== 网络层 (PeerJS) ====================

    function initPeer(id) {
      if (peer) { peer.destroy(); peer = null; }
      peer = new Peer(id, { debug: 0 });
      peer.on('open', function (pid) {
        console.log('Peer connected, ID:', pid);
        if (!roomId) roomId = pid;
        btnCopyLink.dataset.url = window.location.origin + window.location.pathname + '?room=' + pid;
      });
      peer.on('connection', function (incoming) {
        conn = incoming; setupConnection();
      });
      peer.on('error', function (err) {
        console.error('Peer error:', err);
        if (err.type === 'unavailable-id') showToast('房间ID不可用');
        if (err.type === 'peer-unavailable') showToast('无法连接到该房间');
      });
      peer.on('disconnected', function () {
        setConnectionStatus('disconnected', '连接断开，重连中...');
        if (peer && !peer.destroyed) peer.reconnect();
      });
    }

    function setupConnection() {
      if (joinTimeoutId) { clearTimeout(joinTimeoutId); joinTimeoutId = null; }
      conn.on('open', function () {
        isGameStarted = true;
        setConnectionStatus('connected', '已连接');
        if (myColor === RED) sendMessage({ type: 'gameStart', hostColor: RED });
      });
      conn.on('data', function (data) { handleMessage(data); });
      conn.on('close', function () {
        isGameStarted = false;
        setConnectionStatus('disconnected', '对手已断开');
        showToast('对手已断开连接');
      });
      conn.on('error', function () {
        setConnectionStatus('disconnected', '连接出错');
      });
    }

    function sendMessage(msg) { if (conn && conn.open) conn.send(msg); }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'gameStart':
          if (!gameMode) { gameMode = 'online'; myColor = BLACK; isMyTurn = false; }
          isGameStarted = true;
          setConnectionStatus('connected', '已连接');
          updatePlayerLabels();
          refreshBoard();
          break;
        case 'move':
          handleRemoteMove(msg.from.row, msg.from.col, msg.to.row, msg.to.col);
          break;
        case 'resign':
          state.gameOver = { winner: myColor, reason: 'resign' };
          refreshBoard(); showGameOver(); showToast('对手认输了！');
          break;
        case 'drawRequest': showDrawRequest(); break;
        case 'drawResponse':
          if (msg.accepted) {
            state.gameOver = { winner: null, reason: 'draw' };
            refreshBoard();
            overlayMessage.textContent = '🤝 和棋'; overlayMessage.className = '';
            btnOverlayAction.textContent = '再来一局'; overlay.classList.add('show');
            showToast('对方同意了求和');
          } else { showToast('对方拒绝了求和'); }
          break;
        case 'newGame': resetGame(); break;
      }
    }

    function handleRemoteMove(fromRow, fromCol, toRow, toCol) {
      var moves = ChessEngine.getValidMoves(state.board, fromRow, fromCol);
      var isValid = moves.some(function (m) { return m.row === toRow && m.col === toCol; });
      if (!isValid) return;
      if (state.turn !== myColor) {
        state = ChessEngine.makeMove(state, fromRow, fromCol, toRow, toCol);
        isMyTurn = true; selectedPiece = null; validMoves = [];
        refreshBoard();
        if (state.gameOver) showGameOver();
      }
    }

    function setConnectionStatus(status, text) {
      statusDot.className = 'status-dot ' + status;
      statusText.textContent = text;
    }

    function updatePlayerLabels() {
      if (gameMode === 'ai') return;
      if (myColor === RED) {
        playerLabel.textContent = '你（红方 · 先手）';
        opponentLabel.textContent = '对手（黑方）';
      } else {
        playerLabel.textContent = '你（黑方）';
        opponentLabel.textContent = '对手（红方 · 先手）';
      }
    }

    function resetGame() {
      state = ChessEngine.createInitialState();
      selectedPiece = null; validMoves = [];
      isGameStarted = true;
      if (gameMode === 'ai') {
        if (aiPlayerColor === 'red') { myColor = RED; isMyTurn = true; }
        else { myColor = BLACK; isMyTurn = false; }
      } else {
        if (myColor === RED) isMyTurn = true; else isMyTurn = false;
      }
      overlay.classList.remove('show');
      btnResign.disabled = false; btnDraw.disabled = false;
      refreshBoard();
      if (gameMode === 'ai' && !isMyTurn) scheduleAIMove();
    }

    // ==================== 在线对战流程 ====================

    function startOnlineCreate(roomName) {
      gameMode = 'online';
      myColor = RED; isMyTurn = true; isGameStarted = false;
      var id = 'chess-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
      roomId = id;
      initPeer(id);
      state = ChessEngine.createInitialState();
      selectedPiece = null; validMoves = [];

      // 写入 Firebase 大厅
      lobbyRoomId = ChessLobby.createRoom(roomName, id);

      showView('game');
      gameModeTag.textContent = '在线对战';
      statusDot.style.display = '';
      btnCopyLink.style.display = '';
      btnDraw.style.display = '';
      setConnectionStatus('waiting', '等待对手加入...');
      updatePlayerLabels();
      btnCopyLink.dataset.url = window.location.origin + window.location.pathname + '?room=' + id;
      requestAnimationFrame(function () { drawBoard(); refreshBoard(); });
    }

    function startOnlineJoin(hostPeerId, roomIdToJoin) {
      gameMode = 'online';
      myColor = BLACK; isMyTurn = false; isGameStarted = false;
      roomId = hostPeerId;

      initPeer(null);
      peer.on('open', function () {
        setConnectionStatus('waiting', '正在连接...');
        conn = peer.connect(hostPeerId, { reliable: true });
        setupConnection();
      });

      if (joinTimeoutId) clearTimeout(joinTimeoutId);
      joinTimeoutId = setTimeout(function () {
        if (!isGameStarted) {
          setConnectionStatus('disconnected', '连接超时');
          showToast('连接超时，请确认房间是否存在');
        }
      }, 15000);

      // 更新 Firebase
      if (roomIdToJoin) ChessLobby.joinRoom(roomIdToJoin);

      showView('game');
      gameModeTag.textContent = '在线对战';
      statusDot.style.display = '';
      btnCopyLink.style.display = '';
      btnDraw.style.display = '';
      updatePlayerLabels();
      btnCopyLink.dataset.url = window.location.origin + window.location.pathname + '?room=' + hostPeerId;
      requestAnimationFrame(function () { drawBoard(); refreshBoard(); });
    }

    // ==================== 大厅房间列表 ====================

    function renderRoomList(rooms) {
      if (!rooms || Object.keys(rooms).length === 0) {
        lobbyRoomList.innerHTML = '<div class="room-empty">暂无可用房间，来创建一个吧！</div>';
        return;
      }
      var html = '';
      Object.keys(rooms).forEach(function (id) {
        var room = rooms[id];
        var age = Math.floor((Date.now() - room.createdAt) / 60000);
        var timeStr = age < 1 ? '刚刚' : age + '分钟前';
        html += '<div class="room-card">' +
          '<span class="room-name">🏠 ' + escHtml(room.name) + '</span>' +
          '<span class="room-time">' + timeStr + '</span>' +
          '<button class="btn btn-outline btn-small join-room-btn" data-room-id="' + id + '" data-peer-id="' + escHtml(room.hostPeerId) + '">加入</button>' +
          '</div>';
      });
      lobbyRoomList.innerHTML = html;

      // 绑定加入按钮
      var btns = lobbyRoomList.querySelectorAll('.join-room-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener('click', function () {
          startOnlineJoin(this.dataset.peerId, this.dataset.roomId);
        });
      }
    }

    function escHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function initLobby() {
      ChessLobby.onRoomListChanged(function (rooms) {
        if (ChessLobby.isManualMode()) {
          lobbyManualHint.style.display = '';
          renderRoomList(null);
        } else {
          lobbyManualHint.style.display = 'none';
          renderRoomList(rooms);
        }
      });
    }

    function leaveLobby() {
      ChessLobby.offRoomListChanged();
      if (lobbyRoomId) {
        ChessLobby.leaveRoom(lobbyRoomId);
        lobbyRoomId = null;
      }
    }

    // ==================== 求和弹窗 ====================

    function showDrawRequest() {
      overlayMessage.textContent = '🤝 对手请求和棋';
      overlayMessage.className = '';
      btnOverlayAction.textContent = '同意求和';
      overlay.classList.add('show');
      btnOverlayAction.onclick = function () {
        sendMessage({ type: 'drawResponse', accepted: true });
        state.gameOver = { winner: null, reason: 'draw' };
        refreshBoard();
        overlay.classList.remove('show');
        overlayMessage.textContent = '🤝 和棋';
        overlayMessage.className = '';
        btnOverlayAction.textContent = '再来一局';
        btnOverlayAction.onclick = function () {
          overlay.classList.remove('show');
          sendMessage({ type: 'newGame' }); resetGame();
        };
        overlay.classList.add('show');
      };
    }

    // ==================== 事件绑定 ====================

    // 首页
    cardOnline.addEventListener('click', function () {
      showView('lobby'); initLobby();
    });
    cardAI.addEventListener('click', function () { showView('ai-setup'); });

    // 大厅
    btnLobbyCreate.addEventListener('click', function () {
      var name = prompt('输入房间名称：', '棋友对局');
      if (name !== null) startOnlineCreate(name || '无名棋局');
    });
    btnLobbyJoin.addEventListener('click', function () {
      var rid = lobbyRoomInput.value.trim();
      if (!rid) { showToast('请输入房间号'); return; }
      startOnlineJoin(rid, null);
    });
    lobbyRoomInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { btnLobbyJoin.click(); }
    });
    btnLobbyRefresh.addEventListener('click', function () {
      initLobby();
    });
    btnLobbyBack.addEventListener('click', function () {
      leaveLobby(); showView('home');
    });

    // AI设置
    document.querySelectorAll('.diff-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.diff-btn').forEach(function (b) { b.classList.remove('selected'); });
        this.classList.add('selected');
        aiDifficulty = this.dataset.diff;
      });
    });
    document.querySelectorAll('.color-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.color-btn').forEach(function (b) { b.classList.remove('selected'); });
        this.classList.add('selected');
        aiPlayerColor = this.dataset.color;
      });
    });
    btnAIStart.addEventListener('click', startAIGame);
    btnAIBack.addEventListener('click', function () { showView('home'); });

    // 游戏
    btnCopyLink.addEventListener('click', function () {
      var url = this.dataset.url || '';
      if (!url) { showToast('暂无分享链接'); return; }
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function () { showToast('链接已复制！'); });
      } else {
        var ta = document.createElement('textarea');
        ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast('链接已复制！'); }
        catch (e) { showToast('复制失败: ' + url); }
        document.body.removeChild(ta);
      }
    });
    btnGameBack.addEventListener('click', function () {
      if (state.gameOver || confirm('确定要返回吗？当前对局将丢失。')) {
        cleanupGame();
        showView(gameMode === 'online' ? 'lobby' : 'home');
        if (gameMode === 'online') initLobby();
      }
    });
    btnResign.addEventListener('click', function () {
      if (!state.gameOver && isGameStarted) {
        if (gameMode === 'online') sendMessage({ type: 'resign' });
        state.gameOver = { winner: gameMode === 'ai' ? (myColor === RED ? BLACK : RED) : (myColor === RED ? BLACK : RED), reason: 'resign' };
        refreshBoard(); showGameOver();
      }
    });
    btnDraw.addEventListener('click', function () {
      if (!state.gameOver && isGameStarted && gameMode === 'online') {
        sendMessage({ type: 'drawRequest' });
        showToast('已发送求和请求');
      }
    });
    btnOverlayAction.addEventListener('click', function () {
      overlay.classList.remove('show');
      if (gameMode === 'online') sendMessage({ type: 'newGame' });
      resetGame();
    });

    function cleanupGame() {
      if (conn) { conn.close(); conn = null; }
      if (peer) { peer.destroy(); peer = null; }
      if (lobbyRoomId) { ChessLobby.leaveRoom(lobbyRoomId); lobbyRoomId = null; }
      if (joinTimeoutId) { clearTimeout(joinTimeoutId); joinTimeoutId = null; }
      ChessLobby.offRoomListChanged();
      isGameStarted = false;
      gameMode = null;
      aIThinking = false;
    }

    // 窗口大小变化
    var resizeTimeout;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(function () { if (gameMode) { drawBoard(); refreshBoard(); } }, 200);
    });

    // ==================== 初始化 ====================

    function init() {
      // 检查 PeerJS
      if (typeof Peer === 'undefined') {
        document.getElementById('card-online').querySelector('.desc').textContent = '网络模块加载失败，请刷新页面';
      }
      showView('home');
      console.log('🏮 中国象棋已就绪');
    }

    init();
  })();
  </script>
</body>
